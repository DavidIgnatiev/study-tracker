<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">

        <header>
            <h1>Study <span style="color: var(--accent)">Tracker</span></h1>
        </header>

        <div class="stats">
            <span id="statTotal">Total: 0</span>
            <span id="statDone">Done: 0</span>
            <span id="statActive">Active: 0</span>
        </div>

        <form id="taskForm">
            <input type="text" id="taskTitle" placeholder="Task name" required>

            <input list="subjectList" id="taskSubject" placeholder="Subject" required>
            <datalist id="subjectList">
                <option value="JavaScript">
                <option value="HTML">
                <option value="CSS">
                <option value="Math">
                <option value="English">
                <option value="Python">
                <option value="Vue">
            </datalist>

            <select id="taskPriority" required>
                <option value="" selected disabled>Priority</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <input type="date" id="taskDeadline">
            <button type="submit">Add</button>
        </form>

        <div class="filters">
            <input type="search" id="searchInput" placeholder="Search...">
            <select id="statusFilter">
                <option value="all" selected>All</option>
                <option value="active">Active</option>
                <option value="done">Done</option>
            </select>
            <select id="sortSelect">
                <option value="default">Default</option>
                <option value="priority">Priority</option>
                <option value="deadline">Deadline</option>
                <option value="date">Date</option>
            </select>
        </div>

        <ul id="taskList"></ul>

    </main>

    <script src="script.js"></script>
</body>
</html>
